<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - HarvConnect</title>
  <link rel="icon" href="images/HarvConnect-logo.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <style>
    .auth-form .password-strength { margin:-8px 0 16px; }
    .success-state { text-align:center; padding:24px 0; }
    .success-state .icon { font-size:48px; margin-bottom:12px; }
    .success-state h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
    .success-state p { font-size:14px; color:var(--hc-text-gray); margin-bottom:20px; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html"><img src="images/HarvConnect-logo.png" alt="HarvConnect" /></a>
        <h2>Set New <span>Password</span></h2>
      </div>
      <p class="auth-subtitle">Choose a strong password for your account</p>

      <div class="auth-form" id="resetForm">
        <div class="hc-form-group">
          <label for="passwordInput">New Password</label>
          <input type="password" id="passwordInput" class="hc-input" placeholder="Min. 8 characters" autocomplete="new-password" oninput="updateStrength()" />
          <div class="password-strength" id="strengthBar" style="margin-top:4px;height:4px;background:#e5e7eb;border-radius:2px;overflow:hidden;">
            <div id="strengthFill" style="height:100%;width:0;border-radius:2px;transition:width 0.3s;"></div>
          </div>
        </div>
        <div class="hc-form-group">
          <label for="confirmInput">Confirm New Password</label>
          <input type="password" id="confirmInput" class="hc-input" placeholder="Re-enter new password" autocomplete="new-password" />
        </div>
        <button class="hc-btn hc-btn-primary hc-btn-lg hc-btn-block" id="submitBtn" onclick="handleResetPassword()">Reset Password</button>
        <div id="responseMsg" style="margin-top:12px;"></div>
      </div>

      <div class="auth-footer" style="margin-top:0;">
        <a href="login.html" class="auth-link">&larr; Back to Login</a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    var urlParams = new URLSearchParams(window.location.search);
    var resetToken = urlParams.get("token");

    if (!resetToken) {
      document.getElementById("resetForm").innerHTML =
        '<div class="success-state">' +
          '<div class="icon">&#9888;</div>' +
          '<h3>Invalid Link</h3>' +
          '<p>This password reset link is missing or invalid. Please request a new one.</p>' +
          '<a href="forgot-password.html" class="hc-btn hc-btn-primary">Request New Link</a>' +
        "</div>";
    }

    function updateStrength() {
      var val = document.getElementById("passwordInput").value;
      var fill = document.getElementById("strengthFill");
      var score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[a-z]/.test(val)) score++;
      if (/\d/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      var pct = (score / 5) * 100;
      var colors = ["", "#ef4444", "#f97316", "#eab308", "#22c55e", "#16a34a"];
      fill.style.width = pct + "%";
      fill.style.background = colors[score] || "#16a34a";
    }

    function handleResetPassword() {
      var password = document.getElementById("passwordInput").value;
      var confirm = document.getElementById("confirmInput").value;
      var btn = document.getElementById("submitBtn");
      var msg = document.getElementById("responseMsg");

      if (!resetToken) return;

      if (!password) {
        msg.innerHTML = '<p class="hc-error-text">Please enter a new password.</p>';
        return;
      }
      if (password.length < 8 || !/[A-Z]/.test(password) || !/[a-z]/.test(password) || !/\d/.test(password) || !/[^A-Za-z0-9]/.test(password)) {
        msg.innerHTML = '<p class="hc-error-text">Password must be at least 8 characters with uppercase, lowercase, number, and special character.</p>';
        return;
      }
      if (password !== confirm) {
        msg.innerHTML = '<p class="hc-error-text">Passwords do not match.</p>';
        return;
      }

      btn.disabled = true;
      btn.textContent = "Resetting...";
      msg.innerHTML = "";

      HarvConnectAuth.resetPassword(resetToken, password)
        .then(function () {
          document.getElementById("resetForm").innerHTML =
            '<div class="success-state">' +
              '<div class="icon">&#9989;</div>' +
              '<h3>Password Reset Successful</h3>' +
              '<p>Your password has been updated. You can now sign in with your new password.</p>' +
              '<a href="login.html" class="hc-btn hc-btn-primary">Sign In</a>' +
            "</div>";
        })
        .catch(function (err) {
          msg.innerHTML = '<p class="hc-error-text">' + (err.message || "Failed to reset password. The link may have expired.") + "</p>";
          btn.disabled = false;
          btn.textContent = "Reset Password";
        });
    }
  </script>
</body>
</html>
