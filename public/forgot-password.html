<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - HarvConnect</title>
  <link rel="icon" href="images/HarvConnect-logo.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/auth.css" />
  <style>
    .auth-form .field-tip { font-size:13px; color:var(--hc-text-gray); margin:-8px 0 16px; }
    .success-state { text-align:center; padding:24px 0; }
    .success-state .icon { font-size:48px; margin-bottom:12px; }
    .success-state h3 { font-size:18px; font-weight:700; margin-bottom:8px; }
    .success-state p { font-size:14px; color:var(--hc-text-gray); margin-bottom:20px; line-height:1.5; }
  </style>
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="index.html"><img src="images/HarvConnect-logo.png" alt="HarvConnect" /></a>
        <h2>Reset <span>Password</span></h2>
      </div>
      <p class="auth-subtitle">Enter your email and we'll send you a reset link</p>

      <div class="auth-form" id="forgotForm">
        <div class="hc-form-group">
          <label for="emailInput">Email Address</label>
          <input type="email" id="emailInput" class="hc-input" placeholder="you@example.com" autocomplete="email" />
        </div>
        <p class="field-tip">We'll send a password reset link to this email if it's registered.</p>
        <button class="hc-btn hc-btn-primary hc-btn-lg hc-btn-block" id="submitBtn" onclick="handleForgotPassword()">Send Reset Link</button>
        <div id="responseMsg" style="margin-top:12px;"></div>
      </div>

      <div class="auth-footer" style="margin-top:0;">
        <a href="login.html" class="auth-link">&larr; Back to Login</a>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    function handleForgotPassword() {
      var email = document.getElementById("emailInput").value.trim();
      var btn = document.getElementById("submitBtn");
      var msg = document.getElementById("responseMsg");

      if (!email) {
        msg.innerHTML = '<p class="hc-error-text">Please enter your email address.</p>';
        return;
      }

      btn.disabled = true;
      btn.textContent = "Sending...";
      msg.innerHTML = "";

      HarvConnectAuth.forgotPassword(email)
        .then(function () {
          document.getElementById("forgotForm").innerHTML =
            '<div class="success-state">' +
              '<div class="icon">&#9989;</div>' +
              '<h3>Check Your Email</h3>' +
              '<p>If an account exists for <strong>' + HarvConnectUtils.escapeHtml(email) + '</strong>, you will receive a password reset link shortly.</p>' +
              '<a href="login.html" class="hc-btn hc-btn-primary">Back to Login</a>' +
            "</div>";
        })
        .catch(function (err) {
          msg.innerHTML = '<p class="hc-error-text">' + (err.message || "Something went wrong. Please try again.") + "</p>";
          btn.disabled = false;
          btn.textContent = "Send Reset Link";
        });
    }
  </script>
</body>
</html>
