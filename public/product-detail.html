<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details - HarvConnect</title>
  <link rel="icon" href="images/HarvConnect-logo.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/app.css" />
  <link rel="stylesheet" href="css/marketplace.css" />
</head>
<body>
  <div class="app-page">
    <div id="header"></div>
    <main class="app-main">
      <div class="page-container">
        <div id="productContent"></div>
      </div>
    </main>
    <div id="footer"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/notifications.js"></script>
  <script>
    (function () {
      document.getElementById("header").innerHTML = HarvConnectComponents.renderHeader("marketplace");
      document.getElementById("footer").innerHTML = HarvConnectComponents.renderFooter();

      var params = HarvConnectUtils.getParams();
      var productId = params.id;
      var content = document.getElementById("productContent");
      var productData = null;
      var quantity = 1;

      if (!productId) {
        content.innerHTML = HarvConnectComponents.renderErrorState("No product ID provided.");
        return;
      }

      async function loadProduct() {
        content.innerHTML = HarvConnectComponents.renderSkeletonCards(1);
        try {
          var res = await HarvConnectAPI.products.get(productId);
          productData = res.data.product;
          renderProduct();
        } catch (err) {
          content.innerHTML = HarvConnectComponents.renderErrorState(
            "Failed to load product. It may have been removed.",
            "loadProduct"
          );
        }
      }

      function renderProduct() {
        var p = productData;
        var imgUrl = p.image || p.imageUrl;
        var farmerName = (p.farmer && p.farmer.fullName) || p.farmerName || "Farmer";
        var farmerId = p.farmerId || (p.farmer && p.farmer.id) || "";
        var farmerPhone = (p.farmer && p.farmer.phone) || p.farmerPhone || "";
        var farmerInitials = HarvConnectUtils.getInitials(farmerName);
        var stock = Number(p.quantity || p.stock || 0);
        var user = HarvConnectAuth.getUser();
        var isBuyer = user && user.role === "BUYER";
        var isFarmer = user && user.role === "FARMER";

        var actionHtml = "";
        if (isBuyer) {
          actionHtml =
            '<div class="quantity-selector">' +
              '<label>Quantity:</label>' +
              '<div class="quantity-controls">' +
                '<button onclick="updateQty(-1)" aria-label="Decrease quantity">&minus;</button>' +
                '<input type="number" id="qtyInput" value="1" min="1" max="' + stock + '" onchange="setQty(this.value)" />' +
                '<button onclick="updateQty(1)" aria-label="Increase quantity">&plus;</button>' +
              "</div>" +
              '<span style="font-size:13px;color:var(--hc-text-gray);">' + (p.unit || "") + "</span>" +
            "</div>" +
            '<div id="addToCartArea">' +
              '<button class="hc-btn hc-btn-primary hc-btn-lg hc-btn-block" onclick="addToCart()"' + (stock <= 0 ? " disabled" : "") + ">" +
                (stock <= 0 ? "Out of Stock" : "Add to Cart") +
              "</button>" +
            "</div>" +
            '<div style="display:flex;gap:8px;margin-top:8px;">' +
              (farmerId ? '<button class="hc-btn hc-btn-outline hc-btn-sm" onclick="chatFarmer(this)" data-farmer-id="' + farmerId + '" data-farmer-name="' + farmerName.replace(/"/g, "&quot;") + '" style="flex:1;" title="Chat ' + farmerName.replace(/"/g, "&quot;") + '">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;vertical-align:middle;"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg> Chat Seller' +
              "</button>" : "") +
              (farmerPhone ? '<a href="https://wa.me/' + farmerPhone.replace(/[^0-9]/g, "") + '?text=Hello%20' + encodeURIComponent(farmerName || "Farmer") + '%2C%20I%27m%20interested%20in%20your%20produce%20on%20HarvConnect." target="_blank" class="hc-btn hc-btn-outline hc-btn-sm" style="flex:1;" title="WhatsApp ' + farmerName.replace(/"/g, "&quot;") + '">' +
                '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" style="margin-right:4px;vertical-align:middle;"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg> WhatsApp' +
              "</a>" : "") +
            "</div>";
        } else if (isFarmer) {
          actionHtml = '<div style="padding:16px 0;font-size:14px;color:var(--hc-text-gray);border-top:1px solid var(--hc-border);margin-top:8px;">You are viewing this as a farmer. Only buyers can add items to cart.</div>';
        } else if (!user) {
          actionHtml =
            '<div class="hc-mt-16">' +
              '<a href="login.html" class="hc-btn hc-btn-primary hc-btn-lg hc-btn-block">Sign in to Order</a>' +
            "</div>";
        }

        content.innerHTML =
          '<div style="margin-bottom:16px;">' +
            '<a href="marketplace.html" style="color:var(--hc-green);text-decoration:none;font-size:14px;font-weight:600;">&larr; Back to Marketplace</a>' +
          "</div>" +
          '<div class="product-detail-layout">' +
            '<div class="product-detail-img">' +
              (imgUrl
                ? '<img src="' + imgUrl + '" alt="' + (p.name || "") + '" />'
                : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:64px;background:#f8fafc;">&#127807;</div>') +
            "</div>" +
            '<div class="product-detail-info">' +
              '<span class="product-card-category">' + HarvConnectUtils.getCategoryLabel(p.category) + "</span>" +
              "<h1>" + (p.name || "") + "</h1>" +
              '<div class="product-detail-price">' + HarvConnectUtils.formatCedis(p.price) + " / " + (p.unit || "unit") + "</div>" +
              '<div class="product-detail-meta">' +
                '<div class="product-detail-meta-item"><strong>Availability:</strong> ' + stock + " " + (p.unit || "") + " in stock</div>" +
                (p.harvestDate ? '<div class="product-detail-meta-item"><strong>Harvest Date:</strong> ' + HarvConnectUtils.formatDate(p.harvestDate) + "</div>" : "") +
                '<div class="product-detail-meta-item"><strong>Listed:</strong> ' + HarvConnectUtils.formatDate(p.createdAt) + "</div>" +
              "</div>" +
              (p.description ? '<div class="product-detail-desc">' + p.description + "</div>" : '<div style="border-bottom:1px solid var(--hc-border);margin-bottom:24px;"></div>') +
              actionHtml +
              '<div class="farmer-card">' +
                '<div class="farmer-card-header">' +
                  '<div class="farmer-card-avatar">' + farmerInitials + "</div>" +
                  '<div>' +
                    '<div class="farmer-card-name">' + farmerName + "</div>" +
                    '<div class="farmer-card-rating" id="farmerRating">Loading rating...</div>' +
                  "</div>" +
                "</div>" +
              "</div>" +
            "</div>" +
          "</div>";

        if (farmerId) loadFarmerRating(farmerId);
      }

      async function loadFarmerRating(farmerId) {
        try {
          var res = await HarvConnectAPI.reviews.getFarmerRating(farmerId);
          var d = res.data;
          var el = document.getElementById("farmerRating");
          if (el && d) {
            el.innerHTML = HarvConnectUtils.createStars(d.averageRating || 0) +
              " <span>(" + (d.totalReviews || 0) + " reviews)</span>";
          }
        } catch (e) {
          var el = document.getElementById("farmerRating");
          if (el) el.innerHTML = "New farmer";
        }
      }

      window.updateQty = function (delta) {
        var input = document.getElementById("qtyInput");
        var stock = Number(productData.quantity || productData.stock || 0);
        var newVal = quantity + delta;
        if (newVal < 1) newVal = 1;
        if (newVal > stock) newVal = stock;
        quantity = newVal;
        input.value = quantity;
      };

      window.setQty = function (val) {
        var stock = Number(productData.quantity || productData.stock || 0);
        var n = parseInt(val, 10);
        if (isNaN(n) || n < 1) n = 1;
        if (n > stock) n = stock;
        quantity = n;
        document.getElementById("qtyInput").value = quantity;
      };

      window.addToCart = function () {
        if (!HarvConnectAuth.isAuthenticated()) {
          HarvConnectComponents.showToast("Please sign in to add items to your cart.", "info");
          setTimeout(function () { window.location.href = "login.html"; }, 1000);
          return;
        }

        var user = HarvConnectAuth.getUser();
        if (user && user.role !== "BUYER") {
          HarvConnectComponents.showToast("Only buyers can add items to cart.", "info");
          return;
        }

        var p = productData;
        var cart = JSON.parse(sessionStorage.getItem("hc_cart") || "[]");

        var existingIdx = -1;
        for (var i = 0; i < cart.length; i++) {
          if (cart[i].productId === p.id) {
            existingIdx = i;
            break;
          }
        }

        if (existingIdx >= 0) {
          cart[existingIdx].quantity += quantity;
        } else {
          cart.push({
            productId: p.id,
            name: p.name,
            price: Number(p.price),
            unit: p.unit,
            image: p.image || p.imageUrl || "",
            farmerName: p.farmerName || (p.farmer && p.farmer.fullName) || "Farmer",
            farmerId: p.farmerId || "",
            farmerPhone: p.farmerPhone || (p.farmer && p.farmer.phone) || "",
            maxQty: Number(p.quantity || p.stock || 0),
            quantity: quantity,
          });
        }

        sessionStorage.setItem("hc_cart", JSON.stringify(cart));
        HarvConnectComponents.showToast(p.name + " added to cart!", "success");
      };

      window.chatFarmer = function (el) {
        var farmerId = el.getAttribute("data-farmer-id");
        var farmerName = el.getAttribute("data-farmer-name");
        if (typeof HarvConnectChat !== "undefined" && HarvConnectChat.openChat) {
          HarvConnectChat.openChat(farmerId, farmerName);
        } else {
          window.location.href = "chat.html?farmerId=" + encodeURIComponent(farmerId) + "&farmerName=" + encodeURIComponent(farmerName);
        }
      };

      loadProduct();
    })();
  </script>
</body>
</html>
