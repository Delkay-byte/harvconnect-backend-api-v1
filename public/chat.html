<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages - HarvConnect</title>
  <link rel="icon" href="images/HarvConnect-logo.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .chat-layout { display:flex; gap:0; height:calc(100vh - 70px - 120px); min-height:400px; border:1px solid var(--hc-border); border-radius:var(--hc-radius-lg); overflow:hidden; background:#fff; }
    .chat-sidebar { width:320px; flex-shrink:0; border-right:1px solid var(--hc-border); display:flex; flex-direction:column; background:#fafcfb; }
    .chat-sidebar-header { padding:16px 20px; border-bottom:1px solid var(--hc-border); font-size:16px; font-weight:700; }
    .chat-conv-list { flex:1; overflow-y:auto; }
    .chat-conv-item { display:flex; align-items:center; gap:12px; padding:14px 20px; cursor:pointer; transition:background 0.15s; border-bottom:1px solid #f0f0f0; }
    .chat-conv-item:hover { background:var(--hc-green-light); }
    .chat-conv-item.active { background:var(--hc-green-light); border-left:3px solid var(--hc-green); }
    .chat-conv-avatar { width:40px; height:40px; border-radius:50%; background:var(--hc-green-light); color:var(--hc-green); font-size:14px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .chat-conv-info { flex:1; min-width:0; }
    .chat-conv-name { font-size:14px; font-weight:600; display:flex; align-items:center; gap:6px; }
    .chat-conv-preview { font-size:12px; color:var(--hc-text-gray); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .chat-conv-meta { text-align:right; flex-shrink:0; }
    .chat-conv-time { font-size:11px; color:var(--hc-text-light); }
    .chat-conv-badge { display:inline-flex; min-width:18px; height:18px; border-radius:9px; background:var(--hc-danger); color:#fff; font-size:10px; font-weight:700; align-items:center; justify-content:center; padding:0 5px; margin-top:4px; }
    .chat-main { flex:1; display:flex; flex-direction:column; }
    .chat-main-header { padding:14px 20px; border-bottom:1px solid var(--hc-border); display:flex; align-items:center; gap:12px; }
    .chat-main-header-name { font-size:15px; font-weight:700; }
    .chat-main-header-role { font-size:12px; color:var(--hc-text-gray); }
    .chat-msgs { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:8px; }
    .chat-msg { max-width:75%; padding:10px 14px; border-radius:14px; font-size:14px; line-height:1.45; word-wrap:break-word; }
    .chat-msg.sent { align-self:flex-end; background:var(--hc-green); color:#fff; border-bottom-right-radius:4px; }
    .chat-msg.received { align-self:flex-start; background:#f0f0f0; color:var(--hc-text); border-bottom-left-radius:4px; }
    .chat-msg-time { font-size:10px; color:inherit; opacity:0.7; margin-top:4px; text-align:right; }
    .chat-input-area { padding:12px 16px; border-top:1px solid var(--hc-border); display:flex; gap:10px; align-items:flex-end; }
    .chat-input { flex:1; resize:none; border:1.5px solid var(--hc-border); border-radius:20px; padding:10px 16px; font-size:14px; font-family:var(--hc-font); outline:none; transition:border-color 0.2s; max-height:80px; }
    .chat-input:focus { border-color:var(--hc-green); }
    .chat-send-btn { width:40px; height:40px; border-radius:50%; background:var(--hc-green); color:#fff; border:none; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background 0.2s; }
    .chat-send-btn:hover { background:var(--hc-green-hover); }
    .chat-send-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .chat-empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:40px; text-align:center; color:var(--hc-text-gray); }
    .chat-empty-state svg { margin-bottom:12px; }
    .chat-empty-state h3 { font-size:16px; font-weight:600; margin-bottom:4px; color:var(--hc-text); }
    .chat-empty-state p { font-size:13px; }
    .chat-msg-date-divider { text-align:center; font-size:11px; color:var(--hc-text-light); margin:12px 0 4px; }
    .chat-no-select { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; padding:40px; text-align:center; color:var(--hc-text-gray); }
    .chat-no-select svg { margin-bottom:12px; }
    .chat-no-select h3 { font-size:16px; font-weight:600; color:var(--hc-text); }
    .chat-filter-bar { padding:8px 16px; border-bottom:1px solid var(--hc-border); }
    .chat-filter-input { width:100%; padding:8px 12px; border:1px solid var(--hc-border); border-radius:20px; font-size:13px; outline:none; box-sizing:border-box; }
    .chat-filter-input:focus { border-color:var(--hc-green); }
    @media (max-width:768px) {
      .chat-layout { flex-direction:column; height:auto; min-height:auto; border:none; border-radius:0; }
      .chat-sidebar { width:100%; border-right:none; border-bottom:1px solid var(--hc-border); max-height:50vh; }
      .chat-main { min-height:50vh; }
    }
  </style>
</head>
<body>
  <div class="app-page">
    <div id="header"></div>
    <main class="app-main">
      <div class="page-container" style="max-width:960px;padding-top:16px;">
        <div class="chat-layout" id="chatLayout">
          <div class="chat-sidebar">
            <div class="chat-sidebar-header">Conversations</div>
            <div class="chat-filter-bar">
              <input type="text" class="chat-filter-input" id="chatFilter" placeholder="Search conversations..." />
            </div>
            <div class="chat-conv-list" id="convList"></div>
          </div>
          <div class="chat-main" id="chatMain">
            <div class="chat-no-select" id="chatNoSelect">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
              <h3>Select a conversation</h3>
              <p>Choose a chat from the left to start messaging</p>
            </div>
            <div class="chat-main-header" id="chatMainHeader" style="display:none;">
              <div class="chat-conv-avatar" id="chatOtherAvatar"></div>
              <div>
                <div class="chat-main-header-name" id="chatOtherName"></div>
                <div class="chat-main-header-role" id="chatOtherRole"></div>
              </div>
            </div>
            <div class="chat-msgs" id="chatMsgs" style="display:none;"></div>
            <div class="chat-input-area" id="chatInputArea" style="display:none;">
              <textarea class="chat-input" id="chatInput" placeholder="Type a message..." rows="1"></textarea>
              <button class="chat-send-btn" id="chatSendBtn" disabled onclick="sendChatMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </main>
    <div id="footer"></div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script src="js/chat.js"></script>
  <script>
    (function () {
      document.getElementById("header").innerHTML = HarvConnectComponents.renderHeader("chat");
      document.getElementById("footer").innerHTML = HarvConnectComponents.renderFooter();
      HarvConnectComponents.setupNotifListener();

      if (!HarvConnectAuth.requireAuth()) return;

      var user = HarvConnectAuth.getUser();
      var userId = user.id;
      var currentChatId = null;
      var pollTimer = null;

      function getOtherParticipant(chat) {
        return chat.participants.find(function (p) { return p !== userId; });
      }

      function getOtherName(chat) {
        var otherId = getOtherParticipant(chat);
        return chat.participantNames[otherId] || "Unknown";
      }

      function getOtherRole(chat) {
        var otherId = getOtherParticipant(chat);
        return chat.participantRoles[otherId] || "";
      }

      function formatTime(ts) {
        var d = new Date(ts);
        var now = new Date();
        var diff = now - d;
        if (diff < 60000) return "Just now";
        if (diff < 3600000) return Math.floor(diff / 60000) + "m ago";
        if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        if (diff < 86400000 * 2) return "Yesterday";
        return d.toLocaleDateString("en-GB", { day: "numeric", month: "short" });
      }

      function isSameDay(ts1, ts2) {
        var d1 = new Date(ts1);
        var d2 = new Date(ts2);
        return d1.toDateString() === d2.toDateString();
      }

      function renderConvList() {
        var list = document.getElementById("convList");
        var filter = (document.getElementById("chatFilter").value || "").toLowerCase();
        var chats = HarvConnectChat.getUserChats(userId);

        if (filter) {
          chats = chats.filter(function (c) {
            return getOtherName(c).toLowerCase().indexOf(filter) !== -1;
          });
        }

        if (chats.length === 0) {
          list.innerHTML = '<div style="padding:30px 20px;text-align:center;font-size:13px;color:var(--hc-text-gray);">' +
            (filter ? "No conversations match your search." : "No conversations yet. Start chatting from your orders page.") +
            "</div>";
          return;
        }

        list.innerHTML = chats.map(function (c) {
          var otherName = getOtherName(c);
          var otherRole = getOtherRole(c);
          var unread = c.unread[userId] || 0;
          var initials = HarvConnectUtils.getInitials(otherName);
          var preview = c.lastMessage || "No messages yet";
          var isActive = c.chatId === currentChatId;

          return (
            '<div class="chat-conv-item' + (isActive ? " active" : "") + '" onclick="openChat(\'' + c.chatId + "')\">" +
              '<div class="chat-conv-avatar">' + initials + "</div>" +
              '<div class="chat-conv-info">' +
                '<div class="chat-conv-name">' +
                  otherName +
                  '<span style="font-size:11px;color:var(--hc-text-gray);font-weight:400;">(' + (otherRole === "FARMER" ? "Farmer" : otherRole === "BUYER" ? "Buyer" : "Transporter") + ")</span>" +
                "</div>" +
                '<div class="chat-conv-preview">' + preview + "</div>" +
              "</div>" +
              '<div class="chat-conv-meta">' +
                '<div class="chat-conv-time">' + formatTime(c.lastTimestamp) + "</div>" +
                (unread > 0 ? '<div class="chat-conv-badge">' + (unread > 9 ? "9+" : unread) + "</div>" : "") +
              "</div>" +
            "</div>"
          );
        }).join("");
      }

      function renderMessages() {
        var msgsEl = document.getElementById("chatMsgs");
        var header = document.getElementById("chatMainHeader");
        var inputArea = document.getElementById("chatInputArea");
        var noSelect = document.getElementById("chatNoSelect");

        if (!currentChatId) {
          msgsEl.style.display = "none";
          header.style.display = "none";
          inputArea.style.display = "none";
          noSelect.style.display = "flex";
          return;
        }

        noSelect.style.display = "none";
        header.style.display = "flex";
        inputArea.style.display = "flex";

        var idx = HarvConnectChat.getUserChats(userId);
        var chat = idx.find(function (c) { return c.chatId === currentChatId; });
        if (!chat) {
          currentChatId = null;
          renderMessages();
          renderConvList();
          return;
        }

        var otherId = getOtherParticipant(chat);
        var otherName = getOtherName(chat);
        var otherRole = getOtherRole(chat);

        document.getElementById("chatOtherAvatar").textContent = HarvConnectUtils.getInitials(otherName);
        document.getElementById("chatOtherName").textContent = otherName;
        document.getElementById("chatOtherRole").textContent = otherRole === "FARMER" ? "Farmer" : otherRole === "BUYER" ? "Buyer" : "Transporter";

        HarvConnectChat.markAsRead(currentChatId, userId);

        var msgs = HarvConnectChat.getMessages(currentChatId);
        if (msgs.length === 0) {
          msgsEl.innerHTML = '<div style="text-align:center;padding:40px 20px;font-size:13px;color:var(--hc-text-gray);">No messages yet. Say hello!</div>';
          msgsEl.style.display = "block";
          return;
        }

        var html = "";
        for (var i = 0; i < msgs.length; i++) {
          var m = msgs[i];
          var isSent = m.senderId === userId;
          if (i === 0 || !isSameDay(msgs[i-1].timestamp, m.timestamp)) {
            var d = new Date(m.timestamp);
            html += '<div class="chat-msg-date-divider">' + d.toLocaleDateString("en-GB", { day: "numeric", month: "long", year: "numeric" }) + "</div>";
          }
          html +=
            '<div class="chat-msg ' + (isSent ? "sent" : "received") + '">' +
              m.text +
              '<div class="chat-msg-time">' + new Date(m.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" }) + "</div>" +
            "</div>";
        }
        msgsEl.innerHTML = html;
        msgsEl.style.display = "block";
        msgsEl.scrollTop = msgsEl.scrollHeight;
      }

      window.openChat = function (chatId) {
        currentChatId = chatId;
        document.getElementById("chatInput").value = "";
        document.getElementById("chatSendBtn").disabled = true;
        renderConvList();
        renderMessages();
      };

      window.sendChatMessage = function () {
        var input = document.getElementById("chatInput");
        var text = input.value.trim();
        if (!text || !currentChatId) return;
        HarvConnectChat.sendMessage(currentChatId, userId, user.fullName || "Me", text);
        input.value = "";
        document.getElementById("chatSendBtn").disabled = true;
        input.style.height = "auto";
        renderMessages();
        renderConvList();
      };

      document.getElementById("chatInput").addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 80) + "px";
        document.getElementById("chatSendBtn").disabled = !this.value.trim();
      });

      document.getElementById("chatInput").addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendChatMessage();
        }
      });

      document.getElementById("chatFilter").addEventListener("input", function () {
        renderConvList();
      });

      function checkUrlForChat() {
        var params = HarvConnectUtils.getParams();
        if (params.chat) {
          currentChatId = params.chat;
          renderConvList();
          renderMessages();
          // Clean URL
          if (history.replaceState) {
            history.replaceState(null, "", window.location.pathname);
          }
        }
      }

      function startPolling() {
        if (pollTimer) clearInterval(pollTimer);
        pollTimer = setInterval(function () {
          renderConvList();
          if (currentChatId) renderMessages();
        }, 3000);
      }

      window.addEventListener("storage", function (e) {
        if (e.key && (e.key.indexOf("hc_chat") === 0 || e.key === "hc_chat_idx")) {
          renderConvList();
          if (currentChatId) renderMessages();
        }
      });

      checkUrlForChat();
      renderConvList();
      renderMessages();
      startPolling();
    })();
  </script>
</body>
</html>
